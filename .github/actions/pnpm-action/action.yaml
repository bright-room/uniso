name: pnpm action
description: Setup Node.js and pnpm, install dependencies, then run a command

inputs:
  command:
    description: Run command
    required: true

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.32.1

    - uses: actions/setup-node@v6
      with:
        node-version: 24.14.0
        cache: pnpm

    - shell: bash
      run: pnpm install --frozen-lockfile

    - shell: bash
      run: pnpm ${{ inputs.command }}
