name: ci

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: ./.github/actions/setup-node-pnpm

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  check:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: ./.github/actions/setup-node-pnpm

      - name: Build & Test
        run: pnpm test

  e2e:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: ./.github/actions/setup-node-pnpm

      - name: Install Playwright browsers
        run: pnpm --filter @uniso/desktop exec playwright install chromium --with-deps

      - name: Build application
        run: pnpm build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum pnpm --filter @uniso/desktop test:e2e
