name: on-tag-push

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const p of ['apps/desktop/package.json', 'packages/shared/package.json', 'packages/ui/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package DMG
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg-artifact
          path: apps/desktop/dist/*.dmg
          retention-days: 5

  build-windows:
    name: Build Windows (NSIS)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const p of ['apps/desktop/package.json', 'packages/shared/package.json', 'packages/ui/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Package NSIS
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --config electron-builder.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v7
        with:
          name: exe-artifact
          path: apps/desktop/dist/*.exe
          retention-days: 5

  release:
    name: GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"

          gh release create "${GITHUB_REF_NAME}" \
            --title "Uniso ${VERSION_NAME}" \
            --generate-notes \
            artifacts/dmg-artifact/*.dmg \
            artifacts/exe-artifact/*.exe

          INSTALL_NOTES=$(cat <<'EOF'

          ---

          ## Installation

          ### macOS
          1. Download the `.dmg` file and open it
          2. Drag `Uniso.app` to the Applications folder
          3. Since this app is not signed with an Apple Developer certificate, macOS will block it on first launch. To open it:
             - **macOS Sonoma (14) or later**: Go to **System Settings → Privacy & Security**, find the message *"Uniso" was blocked*, and click **Open Anyway**
             - **macOS Ventura (13) or earlier**: Right-click the app → **Open** → click **Open**
             - **If the above doesn't work**: Run `xattr -cr /Applications/Uniso.app` in Terminal, then open the app

          ### Windows
          1. Download the `.exe` installer and run it
          2. Follow the installer instructions
          EOF
          )

          CURRENT_BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body')
          gh release edit "${GITHUB_REF_NAME}" --notes "${CURRENT_BODY}${INSTALL_NOTES}"
