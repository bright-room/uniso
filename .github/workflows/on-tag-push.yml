name: on-tag-push

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package DMG
        uses: ./.github/actions/gradle-action
        with:
          command: packageDmg -PappVersion=${GITHUB_REF_NAME#v}

      - name: Upload DMG Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dmg-artifact
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 5

  build-windows:
    name: Build Windows (MSI)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package MSI
        uses: ./.github/actions/gradle-action
        with:
          command: packageMsi -PappVersion=${GITHUB_REF_NAME#v}

      - name: Upload MSI Artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-artifact
          path: desktopApp/build/compose/binaries/main/msi/*.msi
          retention-days: 5

  release:
    name: GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate Appcast XML
        run: |
          chmod +x scripts/generate-appcast.sh
          ./scripts/generate-appcast.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"

          gh release create "${GITHUB_REF_NAME}" \
            --title "Uniso ${VERSION_NAME}" \
            --generate-notes \
            artifacts/dmg-artifact/*.dmg \
            artifacts/msi-artifact/*.msi \
            appcast.xml

          INSTALL_NOTES=$(cat <<'EOF'

          ---

          ## Installation

          ### macOS
          1. Download the `.dmg` file and open it
          2. Drag `Uniso.app` to the Applications folder
          3. Since this app is not signed with an Apple Developer certificate, macOS will block it on first launch. To open it:
             - **macOS Sonoma (14) or later**: Go to **System Settings → Privacy & Security**, find the message *"Uniso" was blocked*, and click **Open Anyway**
             - **macOS Ventura (13) or earlier**: Right-click the app → **Open** → click **Open**
             - **If the above doesn't work**: Run `xattr -cr /Applications/Uniso.app` in Terminal, then open the app

          ### Windows
          1. Download the `.msi` file and run it
          2. Follow the installer instructions
          EOF
          )

          CURRENT_BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body')
          gh release edit "${GITHUB_REF_NAME}" --notes "${CURRENT_BODY}${INSTALL_NOTES}"
