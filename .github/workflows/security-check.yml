name: security-check

on:
  pull_request:
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  vulnerability-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Dependency vulnerability audit
        run: pnpm audit --prod
        continue-on-error: true

      - name: Audit (strict - high/critical only)
        run: pnpm audit --prod --audit-level=high

  glassworm-detection:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node-pnpm

      - name: Detect invisible Unicode characters (Glassworm)
        run: pnpm security:glassworm

  safe-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Install Aikido Safe Chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - uses: ./.github/actions/setup-node-pnpm
